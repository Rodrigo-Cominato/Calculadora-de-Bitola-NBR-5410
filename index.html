<style>
        /* ==========================================================================
           1. ESTILOS GERAIS E VARIÁVEIS DE TEMA
           ========================================================================== */
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Dark Theme */
            --bg-color: #1a120c;
            --panel-bg: #261b13;
            --panel-border: #3d2b1f;
            --text-primary: #f5ebe0;
            --text-secondary: #d5bdaf;
            --accent-primary: #e07a5f;
            --accent-hover: #f4a261;
            --accent-success: #e9c46a;
            --accent-warning: #f4a261;
            --accent-danger: #d62828;
            --input-bg: #150e09;
            --input-border: #4a3525;
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            /* Light Theme */
            --bg-color: #f8f1e7;
            --panel-bg: #ffffff;
            --panel-border: #e6ccb2;
            --text-primary: #3d2b1f;
            --text-secondary: #7f5539;
            --accent-primary: #c8553d;
            --accent-hover: #b2432b;
            --accent-success: #d4a373;
            --accent-warning: #f4a261;
            --accent-danger: #9e2a2b;
            --input-bg: #fefae0;
            --input-border: #dde5b6;
            --shadow-color: rgba(61, 43, 31, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ==========================================================================
           2. HEADER E CONTROLES
           ========================================================================== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px var(--shadow-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            fill: var(--accent-primary);
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn-ctrl {
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ctrl:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* ==========================================================================
           3. LAYOUT PRINCIPAL
           ========================================================================== */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex-grow: 1;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            border-bottom: 2px solid var(--panel-border);
            padding-bottom: 8px;
            color: var(--accent-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .form-group.full-width {
                grid-column: span 1;
            }
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        select, input {
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            padding: 9px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            text-overflow: ellipsis;
        }

        select:focus, input:focus {
            border-color: var(--accent-primary);
        }

        .input-group {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .input-group input {
            flex: 1;
            min-width: 0;
        }

        .input-group select {
            flex: 1;
            min-width: 0;
            padding: 9px 6px;
            font-size: 0.85rem;
        }

        /* ==========================================================================
           4. RESULTADOS E MÉTRICAS
           ========================================================================== */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .metric-card {
            background-color: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .metric-card.highlight {
            border-color: var(--accent-primary);
            background-color: rgba(224, 122, 95, 0.08);
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 4px;
        }

        .metric-card.highlight .metric-value {
            color: var(--accent-primary);
        }

        .metric-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
        }

        /* ==========================================================================
           5. GRÁFICOS SVG
           ========================================================================== */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .chart-box {
            background-color: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chart-box h4 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* ==========================================================================
           6. MODAL (MEMÓRIA DE CÁLCULO & PARECER)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(20, 14, 10, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-card {
            background-color: var(--input-bg);
            border-left: 4px solid var(--accent-primary);
            padding: 12px;
            border-radius: 0 6px 6px 0;
        }

        .step-card.ai-card {
            border-left-color: var(--accent-success);
            background-color: rgba(233, 196, 106, 0.08);
        }

        .step-title {
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 4px;
        }

        .step-card.ai-card .step-title {
            color: var(--accent-success);
        }

        .formula-box {
            background-color: var(--panel-bg);
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            margin: 6px 0;
            border: 1px dashed var(--panel-border);
            color: var(--text-primary);
        }

        .ai-summary-text {
            font-size: 0.85rem;
            line-height: 1.45;
            color: var(--text-primary);
        }

        /* ==========================================================================
           7. RODAPÉ
           ========================================================================== */
        footer {
            margin-top: 20px;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .footer-content {
            flex: 1;
            text-align: center;
        }

        .profile-thumb {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-primary);
        }

        .print-only-footer {
            display: none;
        }

        /* ==========================================================================
           8. ESTILOS DE IMPRESSÃO (2 PÁGINAS CENTRALIZADAS COM FOTOS E AVISOS)
           ========================================================================== */
        @media print {
            @page {
                size: A4 portrait;
                margin: 8mm;
            }

            html, body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: 100% !important;
            }

            header .controls, .action-btns { 
                display: none !important; 
            }

            .txt-disclaimer {
                color: #000000 !important;
            }

            /* --- PÁGINA 1: CALCULADORA --- */
            .print-page-1 {
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                height: 100vh !important;
                box-sizing: border-box !important;
                page-break-after: always !important;
                padding: 5mm 0 !important;
            }

            header {
                box-shadow: none;
                border: 1px solid #ccc;
                padding: 10px 15px;
                margin-bottom: 10px;
            }

            main {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 12px !important;
                align-items: center !important;
                flex-grow: 1 !important;
            }

            .panel { 
                border: 1px solid #ccc; 
                box-shadow: none; 
                padding: 12px;
                margin-bottom: 0;
            }

            footer {
                border: 1px solid #ccc;
                margin-top: 10px;
                padding: 10px 15px;
                background: white !important;
                color: #000000 !important;
            }

            /* --- PÁGINA 2: MEMÓRIA DE CÁLCULO E PARECER IA --- */
            .modal-overlay { 
                position: static !important; 
                opacity: 1 !important; 
                pointer-events: auto !important; 
                background: none !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                height: 100vh !important;
                width: 100% !important;
                box-sizing: border-box !important;
                padding: 5mm 0 !important;
                page-break-before: always !important;
            }

            .modal-content { 
                max-width: 100% !important; 
                width: 100% !important;
                border: 1px solid #ccc !important; 
                box-shadow: none !important;
                margin: auto 0 !important;
                max-height: none !important;
                background: white !important;
            }

            .modal-header .btn-ctrl {
                display: none !important;
            }

            .modal-body {
                overflow: visible !important;
                padding: 12px;
            }

            .step-card {
                padding: 8px 12px;
            }

            .step-card.ai-card {
                border-left-color: #333;
                background-color: #f9f9f9 !important;
            }

            .print-only-footer {
                display: flex !important;
                border: 1px solid #ccc;
                padding: 10px 15px;
                align-items: center;
                justify-content: space-between;
                gap: 15px;
                font-size: 0.8rem;
                background: white !important;
                color: #000000 !important;
            }

            .profile-thumb {
                border-color: #333 !important;
                display: block !important;
            }
        }
    </style>
